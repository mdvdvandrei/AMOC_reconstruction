# your exact params, adapted to this two-model pipeline

defaults:
  - override hydra/job_logging: disabled  # (optional) disable Hydra's default logging

# Data-related settings
base_dir: "monthly_stream_zarr" #"monthly_stream_zarr"
seed: 42

# All trainable models (CSV)
models: "ACCESS-ESM1-5, ACCESS-CM2, GFDL-ESM4, GFDL-CM4, CAS-ESM2-0, MRI-ESM2-0, INM-CM4-8, MIROC6, CanESM5, CanESM5-CanOE, NorESM2-LM, NorESM2-MM, HadGEM3-GC31-LL, UKESM1-1-LL, HadGEM3-GC31-MM, MPI-ESM1-2-HR, CMCC-ESM2, GISS-E2-1-G, IPSL-CM6A-LR"


#ACCESS-ESM1-5, ACCESS-CM2, GFDL-ESM4, GFDL-CM4, CAS-ESM2-0, MRI-ESM2-0, INM-CM4-8, FGOALS-g3, MIROC6,
# Scenarios (CSV)
scenarios: "piControl,historical,ssp585,ssp126,ssp245"

# Input vars
x_vars: "tos,zos_minus_basin_mean"

# Selected latitudes 
selected_lats: "26.5"

# Preprocessing for x variable (LPF120 or LPF24)
lpf: "LPF120"

noise:

# Whether data is monthly (not passed to dataset here; leave as meta)
monthly: true

# Target settings
target_var: "y"      # with ekman / y_no_ekman / ekman
output_type: "max"

# Validation folds (CSV) — will run a fold per entry


val_model: "ACCESS-ESM1-5, ACCESS-CM2, GFDL-ESM4, GFDL-CM4, CAS-ESM2-0, MRI-ESM2-0, FGOALS-g3, GFDL-ESM4, GFDL-CM4,  MRI-ESM2-0, MIROC6, CanESM5, CanESM5-CanOE, NorESM2-LM, NorESM2-MM, HadGEM3-GC31-LL, UKESM1-1-LL, HadGEM3-GC31-MM, MPI-ESM1-2-HR, CMCC-ESM2, GISS-E2-1-G, IPSL-CM6A-LR"

cmip5_test_models: "ACCESS1-0, FGOALS-s2, CanESM2, MPI-ESM-LR, MRI-CGCM3, MPI-ESM-MR"

model_args:
  dims:   [48, 96, 192, 384]
  depths: [3, 3, 9, 3]
  dropout: 0.5
  sigma_tanh_scale: 8.0
  use_flat_skip: true
  anti_alias: true
  blur_sigma: 1.0



# Global
weight_decay: 1e-4
# Directory (under project root) where training saves checkpoints and inference loads them
weights_root: weights
save_name: "bnn_test_god_bless_it_work_all_vars_all_models_test_120_y"  #bnn_test_god_bless_it_work_test_2models_last_linear_skip_just_join_new_model
linear_activation: false
val_scenario: "historical+rcp85_to2015" # for CMIP5
wandb_project: "CMIP6_TwoModel"

# ----- μ training -----


training:
  batch_size: 128
  num_workers: 12
  learning_rate: 1e-4
  weight_decay: 1e-3                                                                                      

  mu_epochs: 64
  warmup_epochs: 1
  epochs: 128          # total epochs (Stage-2: epochs - mu_epochs)
  t0: 16              # T_0 for CosineAnnealingWarmRestarts (Stage-2)

  var_lambda0: 0   # coefficient on (log σ²)²
  var_lambda_tau: 10  # exponential decay time scale for λ
  early_stop_patience: 32


mu:
  loss: "huber"       # "huber" | "l1" | "mse"
  huber_beta: 0.5




data:
  add_coords: false
  use_sin_cos: false
  combine_x_vars: true
